<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#080b12"/>
    </radialGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold gradient for segments -->
    <linearGradient id="seg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e84040"/>
      <stop offset="100%" stop-color="#c02020"/>
    </linearGradient>
    <linearGradient id="seg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0a020"/>
      <stop offset="100%" stop-color="#c07010"/>
    </linearGradient>
    <linearGradient id="seg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c060"/>
      <stop offset="100%" stop-color="#20903a"/>
    </linearGradient>
    <linearGradient id="seg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4090e8"/>
      <stop offset="100%" stop-color="#2060c0"/>
    </linearGradient>
    <linearGradient id="seg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a040e8"/>
      <stop offset="100%" stop-color="#7020b0"/>
    </linearGradient>
    <linearGradient id="seg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e840a0"/>
      <stop offset="100%" stop-color="#b02070"/>
    </linearGradient>
    <!-- Center hub gradient -->
    <linearGradient id="hub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <!-- Pointer gold -->
    <linearGradient id="ptr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#00e5ff" flood-opacity="0.4"/>
    </filter>
    <filter id="goldshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#fbbf24" flood-opacity="0.5"/>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="32" cy="32" r="28"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle glow overlay -->
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- Wheel group, clipped to circle -->
  <g clip-path="url(#circle-clip)">

    <!-- 6 wheel segments using pie slice paths -->
    <!-- Each slice: center 32,32, radius 28, 60° each -->

    <!-- Slice 1: 0° → 60° (top-right) RED -->
    <path d="M32,32 L60,32 A28,28 0 0,1 46,56.25 Z" fill="url(#seg1)"/>
    <!-- Slice 2: 60° → 120° (right-bottom) ORANGE -->
    <path d="M32,32 L46,56.25 A28,28 0 0,1 18,56.25 Z" fill="url(#seg2)"/>
    <!-- Slice 3: 120° → 180° (bottom-left) GREEN -->
    <path d="M32,32 L18,56.25 A28,28 0 0,1 4,32 Z" fill="url(#seg3)"/>
    <!-- Slice 4: 180° → 240° (left-top) BLUE -->
    <path d="M32,32 L4,32 A28,28 0 0,1 18,7.75 Z" fill="url(#seg4)"/>
    <!-- Slice 5: 240° → 300° (top-left) PURPLE -->
    <path d="M32,32 L18,7.75 A28,28 0 0,1 46,7.75 Z" fill="url(#seg5)"/>
    <!-- Slice 6: 300° → 360° (top-right) PINK -->
    <path d="M32,32 L46,7.75 A28,28 0 0,1 60,32 Z" fill="url(#seg6)"/>

    <!-- Divider lines between slices -->
    <line x1="32" y1="32" x2="60" y2="32"   stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
    <line x1="32" y1="32" x2="46" y2="56.25" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
    <line x1="32" y1="32" x2="18" y2="56.25" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
    <line x1="32" y1="32" x2="4"  y2="32"   stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
    <line x1="32" y1="32" x2="18" y2="7.75" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
    <line x1="32" y1="32" x2="46" y2="7.75" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>

    <!-- Sheen overlay on top half -->
    <path d="M32,32 L60,32 A28,28 0 0,0 4,32 Z" fill="rgba(255,255,255,0.04)"/>
  </g>

  <!-- Outer ring border -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(0,229,255,0.5)" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Center hub -->
  <circle cx="32" cy="32" r="9" fill="#080b12" stroke="url(#hub)" stroke-width="1.8" filter="url(#shadow)"/>

  <!-- S letter in center -->
  <text
    x="32" y="36.5"
    font-family="'Bebas Neue', Arial Black, sans-serif"
    font-size="11"
    font-weight="900"
    text-anchor="middle"
    fill="url(#hub)"
    letter-spacing="0"
  >S</text>

  <!-- Pointer (right side, pointing left into wheel) -->
  <polygon
    points="62,32 55,27.5 55,36.5"
    fill="url(#ptr)"
    filter="url(#goldshadow)"
  />

  <!-- Pointer tip dot -->
  <circle cx="55" cy="32" r="2" fill="#fbbf24" filter="url(#goldshadow)"/>
</svg>